version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ipl-postgres
    environment:
      POSTGRES_USER: ipl_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ipl_agentic_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipl_user -d ipl_agentic_coach"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipl-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ipl-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipl-network

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ipl-app
    environment:
      ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://ipl_user:${DB_PASSWORD:-change-me}@postgres:5432/ipl_agentic_coach
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      SECRET_KEY: ${SECRET_KEY:-change-me-min-32-characters}
      SENTRY_ENABLED: "false"
      SENTRY_DSN: ${SENTRY_DSN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RATE_LIMIT_ENABLED: "true"
      PROMETHEUS_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./ipl_agentic_coach:/app/ipl_agentic_coach
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ipl-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ipl-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ipl-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ipl-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: redis-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - ipl-network

  # pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ipl-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ipl.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ipl-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ipl-network:
    driver: bridge
